<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitrum.Labs - Prices</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active-nav {
            background: linear-gradient(135deg, #f43f5e 0%, #3b82f6 100%);
            color: white !important;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen flex flex-col font-sans antialiased selection:bg-indigo-500 selection:text-white">

    <header class="bg-[#030712]/90 sticky top-0 z-50 border-b border-slate-900/50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3 cursor-pointer">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-rose-500 to-blue-500 flex items-center justify-center font-bold text-xs">AL</div>
                <span class="text-lg font-bold tracking-tight text-slate-200">Arbitrum.Labs</span>
            </a>
            <nav class="flex items-center space-x-1 sm:space-x-2">
                <a href="index.html" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-all">Home</a>
                <a href="concepts.html" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-all">Concepts</a>
                <a href="prices.html" class="px-4 py-2 text-sm font-medium transition-all active-nav">Live Prices</a>
                <a href="simulator.html" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-all">Simulator</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-6 py-12">
        <section class="space-y-12">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6">
                <div class="space-y-2">
                    <span class="text-xs font-bold tracking-widest text-blue-400 uppercase">Live Market</span>
                    <h2 class="text-4xl font-extrabold tracking-tight text-white">Crypto Prices</h2>
                    <p class="text-slate-400 text-sm">
                        Real-time data from the CoinGecko public API. &middot; <span id="timestamp" class="text-slate-500 text-xs">syncing...</span>
                    </p>
                </div>
                <button onclick="fetchCryptoPrices()" class="px-6 py-3 bg-gradient-to-r from-rose-500/20 to-blue-500/20 hover:from-rose-500/30 hover:to-blue-500/30 border border-slate-800 text-slate-200 font-semibold text-sm rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-black/50 cursor-pointer group">
                    <span class="group-hover:rotate-180 transition-transform duration-500">🔄</span> Refresh
                </button>
            </div>

            <div id="prices-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
            
            <p class="text-center text-xs text-slate-600">Data: <a href="https://www.coingecko.com" target="_blank" class="underline hover:text-slate-400">CoinGecko API</a> &middot; No API key required.</p>
        </section>
    </main>

    <footer class="border-t border-slate-950 bg-[#030712] py-8 text-center text-xs text-slate-500 space-y-2">
        <p class="font-semibold text-slate-400">Developer: <span class="text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-blue-400">Web3 Architect</span> | Batch: <span class="text-cyan-400">Arbitrum.Labs-Alpha</span></p>
        <div class="pt-2">
            <a href="https://github.com" target="_blank" class="inline-flex items-center gap-1 text-slate-400 hover:text-white border border-slate-900 bg-[#0b1329] px-3 py-1 rounded-md transition-all">
                🌐 View Project on GitHub
            </a>
        </div>
    </footer>

    <script>
        async function fetchCryptoPrices() {
            const container = document.getElementById('prices-container');
            container.innerHTML = `
                <div class="col-span-full py-12 text-center text-slate-500 font-mono tracking-widest text-xs animate-pulse">
                    LOADING SECURE API NETWORK LEGS...
                </div>
            `;
            
            const assetMap = [
                { id: 'ethereum', symbol: 'ETH', badge: 'ET', name: 'Ethereum', precision: 2 },
                { id: 'bitcoin', symbol: 'BTC', badge: 'BT', name: 'Bitcoin', precision: 0 },
                { id: 'arbitrum', symbol: 'ARB', badge: 'AR', name: 'Arbitrum', precision: 4 },
                { id: 'solana', symbol: 'SOL', badge: 'SO', name: 'Solana', precision: 2 },
                { id: 'polygon', symbol: 'MATIC', badge: 'MA', name: 'Polygon', precision: 4 }
            ];

            try {
                const ids = assetMap.map(a => a.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
                if (!response.ok) throw new Error('API Offline');
                const data = await response.json();
                
                document.getElementById('timestamp').innerText = `updated ${new Date().toLocaleTimeString().toLowerCase()}`;
                container.innerHTML = ''; 

                assetMap.forEach(asset => {
                    const coinData = data[asset.id];
                    const card = document.createElement('div');
                    card.className = "bg-[#0b1329] border border-slate-900 rounded-2xl p-6 flex flex-col justify-between shadow-xl min-h-[160px]";
                    
                    if (!coinData || coinData.usd === undefined) {
                        card.innerHTML = `
                            <div class="flex justify-between items-start">
                                <div class="space-y-1">
                                    <span class="text-xs font-semibold text-slate-500 tracking-wider block">${asset.symbol}</span>
                                    <h4 class="text-lg font-bold text-slate-300">${asset.name}</h4>
                                </div>
                                <div class="w-8 h-8 rounded-full bg-slate-800 text-[10px] font-bold flex items-center justify-center text-slate-400">${asset.badge}</div>
                            </div>
                            <div class="mt-6 text-sm font-medium text-slate-500 italic">Price unavailable</div>
                        `;
                    } else {
                        const price = coinData.usd;
                        const change = coinData.usd_24h_change || 0;
                        const isPositive = change >= 0;

                        card.innerHTML = `
                            <div class="flex justify-between items-start">
                                <div class="space-y-1">
                                    <span class="text-xs font-semibold text-slate-400 tracking-wider block">${asset.symbol}</span>
                                    <h4 class="text-lg font-bold text-white">${asset.name}</h4>
                                </div>
                                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-rose-500/30 to-blue-500/30 text-[10px] font-black flex items-center justify-center text-slate-200 border border-slate-800">${asset.badge}</div>
                            </div>
                            <div class="mt-6 space-y-2">
                                <div class="text-3xl font-bold text-white tracking-tight">
                                    $${price.toLocaleString('en-US', { minimumFractionDigits: asset.precision, maximumFractionDigits: asset.precision })}
                                </div>
                                <div class="flex items-center gap-1 text-xs font-bold ${isPositive ? 'text-emerald-400' : 'text-rose-500'}">
                                    <span>${isPositive ? '▲' : '▼'}</span>
                                    <span>${Math.abs(change).toFixed(2)}%</span>
                                    <span class="text-slate-500 font-medium ml-1">24h</span>
                                </div>
                            </div>
                        `;
                    }
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = `
                    <div class="col-span-full border border-rose-950 bg-rose-500/5 text-rose-400 p-4 rounded-xl text-xs font-mono text-center">
                        ⚠️ NETWORK CONGESTION: CoinGecko pool limits hit. Wait 60 seconds and run refresh.
                    </div>
                `;
            }
        }
        
        // Auto fetch on load
        window.onload = fetchCryptoPrices;
    </script>
</body>
</html>
